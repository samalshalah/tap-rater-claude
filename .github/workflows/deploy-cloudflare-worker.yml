name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - nextjs-commerce
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-worker-nextjs-commerce
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, test, and deploy Worker
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-worker
      url: https://tap-rater-app.sam-alshalah1.workers.dev/

    env:
      NEXT_PUBLIC_SITE_URL: https://taprater.com
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Cloudflare deploy secrets
        shell: bash
        run: |
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error title=Missing Cloudflare account secret::CLOUDFLARE_ACCOUNT_ID is not configured in GitHub Actions secrets."
            exit 1
          fi
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error title=Missing Cloudflare API token secret::CLOUDFLARE_API_TOKEN is not configured in GitHub Actions secrets."
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Build Cloudflare Worker bundle
        run: npm run cf:build

      - name: Verify Cloudflare authentication
        run: npx wrangler whoami

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --verbose

      - name: Show latest Cloudflare deployments
        run: npx wrangler deployments list --name tap-rater-app
