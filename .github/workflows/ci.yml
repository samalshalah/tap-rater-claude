name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SITE_URL: https://taprater.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          if npm pkg get scripts.test | grep -qv "null"; then
            npm test
          else
            echo "No test script configured."
          fi

      - name: Build
        run: npm run build

      # Future final-stage checkout tests can add Stripe test-mode environment
      # variables here. Do not add live Stripe, Supabase, or Resend secrets to CI.
